<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX ПОИСК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 650px;
        }
        /* Логотип */
        .logo {
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .logo-icon svg {
            width: 55px;
            height: 55px;
        }
        .logo-text {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(90deg, #4B0082, #8A2BE2, #FF4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .logo-sub {
            font-size: 18px;
            font-weight: 600;
            color: #444;
            letter-spacing: 2px;
        }
        /* Строка поиска */
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #dfe1e5;
            border-radius: 40px;
            padding: 6px 20px;
            box-shadow: 0 2px 8px rgba(32,33,36,0.08);
            transition: box-shadow 0.2s;
            margin-bottom: 25px;
        }
        .search-box:hover,
        .search-box:focus-within {
            box-shadow: 0 2px 14px rgba(32,33,36,0.18);
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 20px;
            padding: 14px 8px;
            background: transparent;
            color: #202124;
        }
        .search-box button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }
        .search-box button svg {
            width: 26px;
            height: 26px;
            fill: #5f6368;
        }
        /* Кнопка поиска */
        .btn-search {
            background: linear-gradient(135deg, #fc3b2d, #ff6b4a);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(252,59,45,0.3);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(252,59,45,0.4);
        }
        .btn-search:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(252,59,45,0.3);
        }
        .footer-note {
            margin-top: 35px;
            font-size: 14px;
            color: #888;
        }
        .yandex-badge {
            margin-top: 10px;
            color: #666;
            font-size: 13px;
        }
        .yandex-badge span {
            font-weight: bold;
            color: #fc3b2d;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип MAX ПОИСК -->
        <div class="logo">
            <div class="logo-icon">
                <!-- Стилизованный знак: щит с буквой М -->
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32 2L58 12V30C58 44 46 54 32 62C18 54 6 44 6 30V12L32 2Z" fill="white"/>
                    <text x="32" y="44" text-anchor="middle" font-size="32" font-weight="900" fill="url(#shieldGrad)">M</text>
                    <defs>
                        <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#4B0082"/>
                            <stop offset="100%" stop-color="#FF4500"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div>
                <div class="logo-text">MAX</div>
                <div class="logo-sub">ПОИСК</div>
            </div>
        </div>

        <!-- Поисковая строка -->
        <div class="search-box">
            <input type="text" id="queryInput" placeholder="Введите запрос..." autofocus>
            <button onclick="doSearch()" aria-label="Искать">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
        </div>

        <!-- Кнопка MAX ПОИСК (только Яндекс) -->
        <button class="btn-search" onclick="doSearch()">
            ⚡ MAX ПОИСК ⚡
        </button>

        <div class="yandex-badge">
            Работает на технологиях <span>Яндекса</span>
        </div>
        <div class="footer-note">
            Некоторые сайты автоматически исключаются из выдачи
        </div>
    </div>

    <script>
        // ====== ЗАПРЕЩЁННЫЕ САЙТЫ (spam.net удалён по твоему запросу) ======
        const blockedSites = [
            "example.com",
            "bad-site.org",
            "нежелательный-сайт.рф"
            // если нужно добавить ещё – пиши домены через запятую
        ];

        function doSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (query === '') return;

            // Строим строку исключений для Яндекса
            const exclusionString = blockedSites
                .map(site => `-site:${site}`)
                .join(' ');

            // Итоговый запрос
            const fullQuery = query + ' ' + exclusionString;

            // Только Яндекс
            const url = 'https://yandex.ru/search/?text=' + encodeURIComponent(fullQuery);
            window.location.href = url;
        }

        // Enter вместо клика
        document.getElementById('queryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
